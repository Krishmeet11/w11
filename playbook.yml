---
- name: Deploy to Tomcat
  hosts: web
  become: yes
 
  tasks: 
  - name: Copy WAR file to Tomcat
  
    copy:
  	  src: "/var/snap/jenkins/5042/workspace/w11/target/maven112.war"
  	
  	  dest: "/opt/tomcat/webapps/maven112.war"
  	
  	  remote_src: no
  	
  - name: Restart Tomcat
  	  shell: |
  		  /opt/tomcat/bin/shutdown.sh
  		  sleep 5
  		  /opt/tomcat/bin/startup.sh
